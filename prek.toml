minimum_prek_version = "0.3.0"

# generated by thx-hooks
# max-strict, repo-safe baseline for lint/format/safety checks.
[[repos]]
repo = "builtin"
hooks = [
	{ id = "trailing-whitespace" },
	{ id = "end-of-file-fixer" },
	{ id = "mixed-line-ending" },
	{ id = "fix-byte-order-marker" },
	{ id = "check-case-conflict" },
	{ id = "check-merge-conflict" },
	{ id = "check-added-large-files", args = [
		"--maxkb=500",
	] },
	{ id = "check-vcs-permalinks" },
	{ id = "detect-private-key" },
	{ id = "check-symlinks" },
	{ id = "destroyed-symlinks" },
	{ id = "check-shebang-scripts-are-executable" },
	{ id = "check-executables-have-shebangs" },
	{ id = "check-yaml", files = "\\.ya?ml$" },
	{ id = "check-json", files = "\\.json$" },
	{ id = "check-toml", files = "\\.toml$" },
	{ id = "check-xml", files = "\\.xml$" },
]

# additional repo-sourced checks unavailable in builtin
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [{ id = "forbid-new-submodules" }]

# thx-linting:start
[[repos]]
repo = "local"
hooks = [
	{ id = "thx-linting-pre-commit", name = "thx-linting pre-commit", entry = "pnpm run fix:staged", language = "system", pass_filenames = false, stages = [
		"pre-commit",
	] },
	{ id = "thx-linting-pre-push-lint-ci", name = "thx-linting pre-push lint:ci", entry = "pnpm run lint:ci", language = "system", pass_filenames = false, stages = [
		"pre-push",
	] },
	{ id = "thx-linting-pre-push-typecheck", name = "thx-linting pre-push typecheck", entry = "pnpm run typecheck", language = "system", pass_filenames = false, stages = [
		"pre-push",
	] },
]
# thx-linting:end

# thx-knip:start
[[repos]]
repo = "local"
hooks = [
	{ id = "thx-knip-pre-push", name = "thx-knip pre-push", entry = "pnpm run knip:ci", language = "system", pass_filenames = false, stages = [
		"pre-push",
	] },
]
# thx-knip:end
